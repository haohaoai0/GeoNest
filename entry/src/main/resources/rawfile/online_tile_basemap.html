<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <style>
    html,
    body,
    #map {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #eef3ef;
    }

    #map.imagery {
      background: #253237;
    }

    img.tile {
      position: absolute;
      width: 256px;
      height: 256px;
      user-select: none;
      -webkit-user-drag: none;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    (function () {
      var tileSize = 256;
      var mapElement = document.getElementById('map');
      var lastLongitude = 112.55;
      var lastLatitude = 37.87;
      var lastZoom = 6;
      var lastProvider = 'positron';
      var providers = {
        positron: 'https://basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',
        osm: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
        topo: 'https://tile.opentopomap.org/{z}/{x}/{y}.png',
        voyager: 'https://basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png'
      };

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function wrapTileX(x, count) {
        var value = x % count;
        if (value < 0) {
          value += count;
        }
        return value;
      }

      function tileUrl(provider, z, x, y) {
        var template = providers[provider] || providers.positron;
        return template
          .replace('{z}', String(z))
          .replace('{x}', String(x))
          .replace('{y}', String(y));
      }

      function clearTiles() {
        while (mapElement.firstChild) {
          mapElement.removeChild(mapElement.firstChild);
        }
      }

      function setView(longitude, latitude, zoom, provider) {
        lastLongitude = longitude;
        lastLatitude = latitude;
        lastZoom = zoom;
        lastProvider = provider;
        var width = mapElement.clientWidth || window.innerWidth || 1;
        var height = mapElement.clientHeight || window.innerHeight || 1;
        var z = Math.round(clamp(zoom, 2, 18));
        var lat = clamp(latitude, -85, 85);
        var lon = clamp(longitude, -180, 180);
        var latRad = lat * Math.PI / 180;
        var count = Math.pow(2, z);
        var centerX = (lon + 180) / 360 * count * tileSize;
        var centerY = (1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * count * tileSize;
        var startX = Math.floor((centerX - width / 2) / tileSize);
        var endX = Math.floor((centerX + width / 2) / tileSize);
        var startY = Math.floor((centerY - height / 2) / tileSize);
        var endY = Math.floor((centerY + height / 2) / tileSize);

        clearTiles();
        mapElement.className = provider === 'voyager' ? 'imagery' : '';
        for (var y = startY; y <= endY; y++) {
          if (y < 0 || y >= count) {
            continue;
          }
          for (var x = startX; x <= endX; x++) {
            var wrappedX = wrapTileX(x, count);
            var img = document.createElement('img');
            img.className = 'tile';
            img.src = tileUrl(provider, z, wrappedX, y);
            img.style.left = Math.round(x * tileSize - centerX + width / 2) + 'px';
            img.style.top = Math.round(y * tileSize - centerY + height / 2) + 'px';
            mapElement.appendChild(img);
          }
        }
      }

      window.GeoNestTiles = {
        setView: setView
      };
      setView(112.55, 37.87, 6, 'positron');
      window.addEventListener('resize', function () {
        setView(lastLongitude, lastLatitude, lastZoom, lastProvider);
      });
    })();
  </script>
</body>
</html>
